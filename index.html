<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Size Health — Blissclub</title>
<style>
:root{
  --navy:#1C2B4A;--navy-lt:#eef1f7;
  --coral:#E8603C;--coral-lt:#fdf0ec;
  --green:#1f7a50;--green-lt:#e6f4ee;
  --amber:#a86a10;--amber-lt:#fef3e2;
  --red:#b92d20;--red-lt:#fdecea;
  --blue:#1a4fa3;--blue-lt:#e7eefb;
  --purple:#6420a0;--purple-lt:#f0e8fe;
  --g50:#f8f8f7;--g100:#f0efed;--g200:#e0dfdb;
  --g400:#9f9f99;--g600:#636360;--g800:#2a2a27;
  --r:10px;--rs:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--g50);color:var(--g800);min-height:100vh;font-size:14px}

/* HEADER */
.hdr{background:#fff;border-bottom:1px solid var(--g200);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.logo-wrap{display:flex;align-items:center;gap:12px}
.logo-divider{width:1px;height:22px;background:var(--g200)}
.logo-title{font-size:13px;font-weight:500;color:var(--g600)}
.hdr-right{display:flex;align-items:center;gap:10px}
.hdr-date{font-size:11px;color:var(--g400)}
.data-badge{font-size:11px;background:var(--navy-lt);color:var(--navy);padding:3px 10px;border-radius:20px;font-weight:500;white-space:nowrap}

/* DASH */
.dash{padding:1.25rem 1.5rem 4rem;max-width:1440px;margin:0 auto}

/* SCORECARD */
.scorecard{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:1.25rem}
@media(max-width:900px){.scorecard{grid-template-columns:repeat(3,1fr)}}
@media(max-width:560px){.scorecard{grid-template-columns:repeat(2,1fr)}}
.sc{background:#fff;border:0.5px solid var(--g200);border-radius:var(--r);padding:.875rem 1.125rem}
.sc .lbl{font-size:10px;color:var(--g600);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.sc .val{font-size:24px;font-weight:700;line-height:1}
.sc .sub{font-size:11px;color:var(--g600);margin-top:4px}
.sc.green .val{color:var(--green)}.sc.red .val{color:var(--red)}
.sc.amber .val{color:var(--amber)}.sc.navy .val{color:var(--navy)}.sc.blue .val{color:var(--blue)}

/* FILTERS */
.filters{background:#fff;border:0.5px solid var(--g200);border-radius:var(--r);padding:.875rem 1.125rem;margin-bottom:1.25rem;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.fg{display:flex;align-items:center;gap:5px}
.fg label{font-size:11px;color:var(--g600);font-weight:500;white-space:nowrap}
select,input[type=text],input[type=number]{font-size:12px;padding:6px 8px;border:0.5px solid var(--g200);border-radius:var(--rs);background:var(--g50);color:var(--g800);outline:none;-webkit-appearance:none}
select:focus,input:focus{border-color:var(--coral)}
.si{min-width:180px;max-width:220px}.ni{width:60px}
.fdiv{width:1px;height:22px;background:var(--g200);margin:0 2px}
.btn-reset{font-size:12px;color:var(--g600);background:none;border:0.5px solid var(--g200);padding:5px 12px;border-radius:var(--rs);cursor:pointer}
.btn-export{font-size:12px;color:var(--navy);background:var(--navy-lt);border:none;padding:6px 14px;border-radius:var(--rs);cursor:pointer;font-weight:500;margin-left:auto}
@media(max-width:600px){.filters{gap:6px}.si{min-width:140px}.fdiv{display:none}.btn-export{margin-left:0}}

/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:1.125rem;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.tab{font-size:13px;padding:7px 16px;border-radius:var(--rs);cursor:pointer;border:0.5px solid var(--g200);background:#fff;color:var(--g600);font-weight:500;white-space:nowrap;flex-shrink:0}
.tab.on{background:var(--navy);color:#fff;border-color:var(--navy)}

/* TABLE */
.tbl-wrap{background:#fff;border:0.5px solid var(--g200);border-radius:var(--r);overflow:hidden}
.tbl-hdr{padding:10px 14px;font-size:11px;color:var(--g600);border-bottom:0.5px solid var(--g100);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:700px}
thead th{background:var(--g50);padding:9px 12px;text-align:left;font-size:10px;font-weight:600;color:var(--g600);text-transform:uppercase;letter-spacing:.05em;border-bottom:0.5px solid var(--g200);white-space:nowrap;cursor:pointer;user-select:none;-webkit-user-select:none}
thead th:hover{color:var(--navy)}
thead th.sorted{color:var(--coral)}
tbody tr{border-bottom:0.5px solid var(--g100)}
tbody tr:hover{background:var(--g50)}
tbody tr:last-child{border-bottom:none}
td{padding:9px 12px;vertical-align:middle}

/* MOBILE CARD VIEW */
.card-list{display:none;flex-direction:column;gap:10px}
.style-card{background:#fff;border:0.5px solid var(--g200);border-radius:var(--r);padding:1rem}
.style-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.style-card-name{font-size:13px;font-weight:600;color:var(--navy);line-height:1.3}
.style-card-color{font-size:11px;color:var(--g600);margin-top:2px}
.style-card-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.style-card-meta{display:flex;gap:8px;flex-wrap:wrap}
.style-card-meta span{font-size:10px;color:var(--g600)}
.style-card-dots{margin-top:8px}
@media(max-width:700px){.tbl-scroll{display:none}.card-list{display:flex}}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.b-fss{background:var(--green-lt);color:var(--green)}
.b-css{background:var(--blue-lt);color:var(--blue)}
.b-broken{background:var(--red-lt);color:var(--red)}
.b-na{background:var(--g100);color:var(--g600)}
.b-par{background:var(--navy-lt);color:var(--navy)}
.b-core{background:var(--purple-lt);color:var(--purple)}
.b-men{background:#fff0e8;color:#9a4a10;font-size:9px;padding:2px 6px}

/* SIZE DOTS */
.sdots{display:flex;gap:2px;flex-wrap:wrap}
.dot{min-width:26px;height:19px;border-radius:3px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
.dot.ok{background:var(--green-lt);color:var(--green)}
.dot.low{background:var(--amber-lt);color:var(--amber)}
.dot.miss{background:var(--red-lt);color:var(--red)}
.sz-lbl{font-size:9px;color:var(--g400);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;margin-top:5px}

/* CATEGORY GRID */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
@media(max-width:560px){.cat-grid{grid-template-columns:1fr}}
.cat-card{background:#fff;border:0.5px solid var(--g200);border-radius:var(--r);padding:1.125rem}
.cat-card h3{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:10px;display:flex;justify-content:space-between;align-items:baseline}
.cat-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px}
.cs{text-align:center;background:var(--g50);border-radius:var(--rs);padding:6px 3px}
.cs .cv{font-size:17px;font-weight:600}
.cs .cl{font-size:9px;color:var(--g600);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}
.prog{height:5px;background:var(--g100);border-radius:3px;overflow:hidden;margin-top:6px}
.prog-bar{height:100%;border-radius:3px;transition:width .6s ease}

/* PAGER */
.pager{display:flex;justify-content:center;align-items:center;gap:5px;padding:.875rem;border-top:0.5px solid var(--g100)}
.pbtn{min-width:34px;height:34px;border:0.5px solid var(--g200);border-radius:var(--rs);background:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--g800)}
.pbtn:hover{background:var(--g100)}
.pbtn.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.pbtn:disabled{opacity:.35;cursor:not-allowed}

/* LOADER */
.loader{position:fixed;inset:0;background:var(--g50);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:14px}
.spin{width:36px;height:36px;border:3px solid var(--g200);border-top-color:var(--coral);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{font-size:13px;color:var(--g600)}
.bc-logo-load{margin-bottom:8px}
.empty{text-align:center;padding:3rem;color:var(--g600);font-size:13px}
</style>
</head>

<!-- HEADER -->
<div class="hdr">

    <svg height="30" viewBox="0 0 200 50" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="25" cy="25" r="25" fill="#111"/>
      <path d="M18 15 C18 15 26 13 30 18 C34 23 31 29 27 31 C23 33 17 30 16 26 C15 22 17 17 20 15" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

    <div class="logo-divider"></div>

<!-- DASHBOARD -->
<div class="dash" id="dash" style="display:none">

  <div class="filters">
    <div class="fg"><label>Search</label><input type="text" class="si" id="f-s" placeholder="Product or color…"></div>
    <div class="fdiv"></div>
    <div class="fg"><label>Status</label>
      <select id="f-st">
        <option value="">All statuses</option>
        <option value="fss">✓ Full size set</option>
        <option value="css">◑ Core size set</option>
        <option value="fss-broken">✗ FSS broken</option>
        <option value="css-broken">✗ CSS broken</option>
      </select>
    </div>
    <div class="fg"><label>Category</label><select id="f-cat"><option value="">All categories</option></select></div>
    <div class="fg"><label>Collection</label><select id="f-coll"><option value="">All collections</option></select></div>
    <div class="fg"><label>Pareto</label><select id="f-par"><option value="">All</option></select></div>
    <div class="fg"><label>Colour tag</label><select id="f-cc"><option value="">All</option></select></div>
    <div class="fg"><label>Type</label>
      <select id="f-tall">
        <option value="">All</option>
        <option value="tall">Has tall sizes</option>
        <option value="reg">Regular only</option>
        <option value="men">Men's only</option>
      </select>
    </div>
    <div class="fdiv"></div>
    <div class="fg"><label>Threshold</label><input type="number" class="ni" id="f-thr" value="20" min="0"></div>
    <button class="btn-reset" onclick="resetF()">Reset</button>
    <button class="btn-export" onclick="exportCSV()">↓ Export</button>
  </div>

  <div class="tabs">
    <button class="tab on" id="t-sty" onclick="switchTab('style')">Style view</button>
    <button class="tab" id="t-cat" onclick="switchTab('cat')">Category view</button>
    <button class="tab" id="t-coll" onclick="switchTab('coll')">Collection view</button>
  </div>

  <!-- STYLE TABLE (desktop) + CARDS (mobile) -->
  <div id="v-style">
    <div class="tbl-wrap">
      <div class="tbl-hdr">
        <span id="tbl-ct" style="font-weight:500"></span>
        <span style="font-size:11px;color:var(--g400)">Green = ok · Amber = low · Red = zero</span>
      </div>
      <div class="tbl-scroll">
        <table>
          <thead><tr>
            <th onclick="srt('product')" id="th-product">Product <span id="sa-product">↕</span></th>
            <th onclick="srt('color')" id="th-color">Color <span id="sa-color">↕</span></th>
            <th onclick="srt('category')" id="th-category">Category <span id="sa-category">↕</span></th>
            <th onclick="srt('collection')" id="th-collection">Collection <span id="sa-collection">↕</span></th>
            <th onclick="srt('fss')" id="th-fss">FSS <span id="sa-fss">↑</span></th>
            <th onclick="srt('css')" id="th-css">CSS <span id="sa-css">↕</span></th>
            <th>Sizes</th>
            <th onclick="srt('pareto')" id="th-pareto">Pareto <span id="sa-pareto">↕</span></th>
            <th onclick="srt('coreColour')" id="th-coreColour">Colour tag <span id="sa-coreColour">↕</span></th>
          </tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <!-- MOBILE CARDS -->
      <div class="card-list" id="card-list"></div>
      <div class="pager" id="pager"></div>
    </div>
  </div>

  <div id="v-cat" style="display:none"><div class="cat-grid" id="cat-grid"></div></div>
  <div id="v-coll" style="display:none"><div class="cat-grid" id="coll-grid"></div></div>
</div>

async function init(){
  const bin=atob(B64),bytes=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  const ds=new DecompressionStream('gzip'),w=ds.writable.getWriter();
  w.write(bytes);w.close();
  const out=await new Response(ds.readable).arrayBuffer();
  ALL=JSON.parse(new TextDecoder().decode(out));
  document.getElementById('data-badge').textContent=ALL.length.toLocaleString()+' styles';
  document.getElementById('hdr-date').textContent='Updated 24 Jun 2026';
  populateFilters();applyFilters();
  document.getElementById('loader').style.display='none';
  document.getElementById('dash').style.display='block';
}

function recompute(thr){
  ALL.forEach(s=>{
    const sz=s.isMenBottom?SZ.mb:s.isMen?SZ.ma:SZ.w;
    s.fss=sz.fss.every(k=>(s.sizes[k]||0)>thr)?'Full size set':'Broken';
    s.css=sz.css.every(k=>(s.sizes[k]||0)>thr)?'Core size set':'Broken';
    if(s.hasTall&&SZ.w.fssT){
      s.fssTall=SZ.w.fssT.every(k=>(s.sizes[k]||0)>thr)?'Full size set – Tall':'Broken';
      s.cssTall=SZ.w.cssT.every(k=>(s.sizes[k]||0)>thr)?'Core size set – Tall':'Broken';
    }
  });
}

function populateFilters(){
  const uniq=k=>[...new Set(ALL.map(s=>s[k]).filter(v=>v&&v!=='nan'))].sort();
  fill('f-cat',uniq('category'));fill('f-coll',uniq('collection'));
  fill('f-par',uniq('pareto'));fill('f-cc',uniq('coreColour'));
}
function fill(id,vals){
  const el=document.getElementById(id),cur=el.value;
  while(el.options.length>1)el.remove(1);
  vals.forEach(v=>el.add(new Option(v,v)));
  if(cur)el.value=cur;
}
function applyFilters(){
  const thr=parseInt(document.getElementById('f-thr').value)||20;
  recompute(thr);
  const q=document.getElementById('f-s').value.toLowerCase();
  const st=document.getElementById('f-st').value;
  const cat=document.getElementById('f-cat').value;
  const coll=document.getElementById('f-coll').value;
  const par=document.getElementById('f-par').value;
  const cc=document.getElementById('f-cc').value;
  const tall=document.getElementById('f-tall').value;
  filtered=ALL.filter(s=>{
    if(q&&!s.product.toLowerCase().includes(q)&&!s.color.toLowerCase().includes(q))return false;
    if(st==='fss'&&s.fss!=='Full size set')return false;
    if(st==='css'&&s.css!=='Core size set')return false;
    if(st==='fss-broken'&&s.fss!=='Broken')return false;
    if(st==='css-broken'&&s.css!=='Broken')return false;
    if(cat&&s.category!==cat)return false;
    if(coll&&s.collection!==coll)return false;
    if(par&&s.pareto!==par)return false;
    if(cc&&s.coreColour!==cc)return false;
    if(tall==='tall'&&!s.hasTall)return false;
    if(tall==='reg'&&(s.hasTall||s.isMen))return false;
    if(tall==='men'&&!s.isMen)return false;
    return true;
  });
  sortData();page=1;
  renderScore();renderTable();renderGrid('category','cat-grid');renderGrid('collection','coll-grid');
}
['f-s','f-st','f-cat','f-coll','f-par','f-cc','f-tall'].forEach(id=>
  document.getElementById(id).addEventListener(id==='f-s'?'input':'change',applyFilters));
document.getElementById('f-thr').addEventListener('change',applyFilters);

function resetF(){
  ['f-s','f-st','f-cat','f-coll','f-par','f-cc','f-tall'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-thr').value='20';applyFilters();
}

function srt(col){
  if(sCol===col)sDir*=-1;else{sCol=col;sDir=1;}
  document.querySelectorAll('thead th').forEach(t=>t.classList.remove('sorted'));
  const th=document.getElementById('th-'+col);if(th)th.classList.add('sorted');
  document.querySelectorAll('[id^="sa-"]').forEach(e=>e.textContent='↕');
  const sa=document.getElementById('sa-'+col);if(sa)sa.textContent=sDir===1?'↑':'↓';
  sortData();renderTable();
}
function sortData(){
  const ord={'broken':0,'core size set':1,'full size set':2};
  filtered.sort((a,b)=>{
    if(sCol==='fss'||sCol==='css')return sDir*((ord[(a[sCol]||'').toLowerCase()]??9)-(ord[(b[sCol]||'').toLowerCase()]??9));
    return sDir*(a[sCol]||'').toLowerCase().localeCompare((b[sCol]||'').toLowerCase());
  });
}

function renderScore(){
  const n=filtered.length;
  const fssOk=filtered.filter(s=>s.fss==='Full size set').length;
  const fssB=n-fssOk;
  const cssOk=filtered.filter(s=>s.css==='Core size set').length;
  const menCt=filtered.filter(s=>s.isMen).length;
  const tallCt=filtered.filter(s=>s.hasTall).length;
  const p=v=>n?Math.round(v/n*100):0;
  document.getElementById('scorecard').innerHTML=`
    <div class="sc navy"><div class="lbl">Total styles</div><div class="val">${n.toLocaleString()}</div><div class="sub">${menCt} men's · ${tallCt} tall</div></div>
    <div class="sc green"><div class="lbl">Full size set</div><div class="val">${p(fssOk)}%</div><div class="sub">${fssOk} styles</div></div>
    <div class="sc red"><div class="lbl">FSS broken</div><div class="val">${p(fssB)}%</div><div class="sub">${fssB} styles</div></div>
    <div class="sc blue"><div class="lbl">Core size set</div><div class="val">${p(cssOk)}%</div><div class="sub">${cssOk} styles</div></div>
    <div class="sc amber"><div class="lbl">CSS broken</div><div class="val">${p(n-cssOk)}%</div><div class="sub">${n-cssOk} styles</div></div>`;
}

function makeDots(s,thr){
  if(s.isMenBottom){
    const waists=['28','30','32','34','36','38','40'],lens=['28','30','32'];
    let h='';
    waists.forEach(w=>{
      const row=lens.map(l=>{const k=w+'x'+l,v=s.sizes[k]||0,cls=v>thr?'ok':v>0?'low':'miss';return`<div class="dot ${cls}" style="min-width:30px;font-size:8px" title="${k}: ${v}">${k}</div>`;}).join('');
      h+=`<div style="display:flex;gap:2px;margin-bottom:2px">${row}</div>`;
    });
    return h;
  }
  if(s.isMen){
    const sz=SZ.ma;
    return`<div class="sdots">${sz.fss.map(k=>{const v=s.sizes[k]||0,cls=v>thr?'ok':v>0?'low':'miss';return`<div class="dot ${cls}" title="${k}: ${v}">${sz.lbl[k]}</div>`;}).join('')}</div>`;
  }
  const sz=SZ.w;
  let h=`<div class="sdots">${sz.fss.map(k=>{const v=s.sizes[k]||0,cls=v>thr?'ok':v>0?'low':'miss',css=sz.css.includes(k)?'outline:1.5px solid currentColor;outline-offset:-1px;':'';return`<div class="dot ${cls}" style="${css}" title="${k}: ${v}">${sz.lbl[k]}</div>`;}).join('')}</div>`;
  if(s.hasTall)h+=`<div class="sz-lbl">Tall</div><div class="sdots">${sz.fssT.map(k=>{const v=s.sizes[k]||0,cls=v>thr?'ok':v>0?'low':'miss';return`<div class="dot ${cls}" title="${k}: ${v}">${sz.lblT[k]}</div>`;}).join('')}</div>`;
  return h;
}

function renderTable(){
  const thr=parseInt(document.getElementById('f-thr').value)||20;
  const start=(page-1)*PG,slice=filtered.slice(start,start+PG);
  document.getElementById('tbl-ct').textContent=`${start+1}–${Math.min(start+PG,filtered.length)} of ${filtered.length} styles`;
  if(!slice.length){
    document.getElementById('tbody').innerHTML='<tr><td colspan="9"><div class="empty">No styles match your filters.</div></td></tr>';
    document.getElementById('card-list').innerHTML='<div class="empty">No styles match your filters.</div>';
    renderPager();return;
  }
  // Desktop table
  document.getElementById('tbody').innerHTML=slice.map(s=>`<tr>
    <td style="font-weight:500;color:var(--navy);font-size:12px">${s.product}${s.isMen?'<span class="badge b-men" style="margin-left:4px">Men</span>':''}</td>
    <td style="font-size:11px;color:var(--g600)">${s.color}</td>
    <td style="font-size:11px;color:var(--g600)">${s.category||'—'}</td>
    <td style="font-size:11px;color:var(--g600);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${s.collection}">${s.collection||'—'}</td>
    <td>${bdg(s.fss)}</td>
    <td>${bdg(s.css)}</td>
    <td style="min-width:190px">${makeDots(s,thr)}</td>
    <td>${s.pareto&&s.pareto!=='nan'?`<span class="badge b-par">${s.pareto}</span>`:'—'}</td>
    <td>${s.coreColour&&s.coreColour!=='nan'?`<span class="badge b-core">${s.coreColour}</span>`:'—'}</td>
  </tr>`).join('');
  // Mobile cards
  document.getElementById('card-list').innerHTML=slice.map(s=>`
    <div class="style-card">
      <div class="style-card-top">
        <div>
          <div class="style-card-name">${s.product} ${s.isMen?'<span class="badge b-men">Men</span>':''}</div>
          <div class="style-card-color">${s.color}</div>
        </div>
      </div>
      <div class="style-card-badges">
        ${bdg(s.fss)} ${bdg(s.css)}
        ${s.pareto&&s.pareto!=='nan'?`<span class="badge b-par">${s.pareto}</span>`:''}
        ${s.coreColour&&s.coreColour!=='nan'?`<span class="badge b-core">${s.coreColour}</span>`:''}
      </div>
      <div class="style-card-meta">
        <span>${s.category||''}</span>
        ${s.collection?`<span>· ${s.collection}</span>`:''}
      </div>
      <div class="style-card-dots">${makeDots(s,thr)}</div>
    </div>`).join('');
  renderPager();
}
function bdg(v){
  if(!v||v==='nan')return'<span class="badge b-na">—</span>';
  if(v.startsWith('Full'))return`<span class="badge b-fss">✓ ${v}</span>`;
  if(v.startsWith('Core'))return`<span class="badge b-css">◑ ${v}</span>`;
  return'<span class="badge b-broken">✗ Broken</span>';
}

function renderPager(){
  const tot=Math.ceil(filtered.length/PG),pg=document.getElementById('pager');
  if(tot<=1){pg.innerHTML='';return;}
  let h=`<button class="pbtn" onclick="goPg(${page-1})" ${page===1?'disabled':''}>‹</button>`;
  const range=[];
  for(let i=1;i<=tot;i++){if(i===1||i===tot||(i>=page-2&&i<=page+2))range.push(i);else if(range[range.length-1]!=='…')range.push('…');}
  range.forEach(p=>{if(p==='…')h+='<span class="pbtn" style="border:none;cursor:default">…</span>';else h+=`<button class="pbtn ${p===page?'on':''}" onclick="goPg(${p})">${p}</button>`;});
  h+=`<button class="pbtn" onclick="goPg(${page+1})" ${page===tot?'disabled':''}>›</button>`;
  pg.innerHTML=h;
}
function goPg(p){const m=Math.ceil(filtered.length/PG);if(p<1||p>m)return;page=p;renderTable();window.scrollTo(0,0);}

function renderGrid(gk,cid){
  const groups={};
  filtered.forEach(s=>{const k=s[gk]||'—';if(!groups[k])groups[k]=[];groups[k].push(s);});
  const el=document.getElementById(cid);
  const keys=Object.keys(groups).sort();
  if(!keys.length){el.innerHTML='<div class="empty">No data.</div>';return;}
  el.innerHTML=keys.map(k=>{
    const arr=groups[k],n=arr.length;
    const fssB=arr.filter(s=>s.fss==='Broken').length,cssB=arr.filter(s=>s.css==='Broken').length;
    const fssOk=n-fssB,health=n?Math.round(fssOk/n*100):0;
    const clr=health>=80?'var(--green)':health>=50?'var(--amber)':'var(--red)';
    return`<div class="cat-card">
      <h3>${k}<span style="font-size:12px;font-weight:500;color:${clr}">${health}% healthy</span></h3>
      <div class="cat-stats">
        <div class="cs"><div class="cv" style="color:var(--navy)">${n}</div><div class="cl">Styles</div></div>
        <div class="cs"><div class="cv" style="color:var(--green)">${fssOk}</div><div class="cl">FSS ok</div></div>
        <div class="cs"><div class="cv" style="color:var(--red)">${fssB}</div><div class="cl">FSS broken</div></div>
        <div class="cs"><div class="cv" style="color:var(--amber)">${cssB}</div><div class="cl">CSS broken</div></div>
      </div>
      <div class="prog"><div class="prog-bar" style="width:${health}%;background:${clr}"></div></div>
    </div>`;
  }).join('');
}

function switchTab(t){
  ['style','cat','coll'].forEach(v=>document.getElementById('v-'+v).style.display=v===t?'block':'none');
  document.getElementById('t-sty').className='tab'+(t==='style'?' on':'');
  document.getElementById('t-cat').className='tab'+(t==='cat'?' on':'');
  document.getElementById('t-coll').className='tab'+(t==='coll'?' on':'');
}

function exportCSV(){
  const h=['Product','Color','Collection','Category','FSS','CSS','Pareto','Colour Tag','MRP'];
  const rows=filtered.map(s=>[s.product,s.color,s.collection,s.category,s.fss,s.css,s.pareto,s.coreColour,s.mrp]);
  const csv=[h,...rows].map(r=>r.map(c=>`"${(c||'').toString().replace(/"/g,'""')}"`).join(',')).join('\n');
  Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([csv],{type:'text/csv'})),download:`blissclub-size-health-24jun2026.csv`}).click();
}

init();
</script>
</body>
</html>
